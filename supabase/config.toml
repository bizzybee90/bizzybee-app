[auth]
site_url = "https://bizzybee-app.pages.dev"
additional_redirect_urls = [
  "https://bizzybee-app.pages.dev/auth",
  "https://bizzybee-app.pages.dev/**",
  "https://*.bizzybee-app.pages.dev/**",
  "https://bizzybee.app/**",
  "https://bizzyb.ee/**",
  "https://app.bizzyb.ee/**",
  "https://app.bizzybee.co.uk/**",
  "http://localhost:4176/**",
  "http://127.0.0.1:4176/**",
  "http://localhost:5173/**",
  "http://localhost:8080/**",
]

[auth.rate_limit]
email_sent = 30

[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(RESEND_AUTH_SMTP_KEY)"
admin_email = "noreply@bizzyb.ee"
sender_name = "BizzyBee"

